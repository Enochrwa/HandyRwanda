name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run lint -w web
      - run: npm run type-check -w web
      - run: npm run test -w web

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run lint -w mobile
      - run: npm run type-check -w mobile
      - run: npm run test -w mobile

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest httpx
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - run: PYTHONPATH=$PYTHONPATH:$(pwd)/backend npm run lint -w backend
      - run: PYTHONPATH=$PYTHONPATH:$(pwd)/backend npm run type-check -w backend
      - run: PYTHONPATH=$PYTHONPATH:$(pwd)/backend npm run test -w backend
