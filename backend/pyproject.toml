[tool.ruff]
line-length = 88
target-version = "py310"
exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP", "PL"]
ignore = ["PLR2004", "B008", "E501", "B904", "PLR0913"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11.14"
strict = true
ignore_missing_imports = true
disallow_untyped_decorators = false
exclude = ["tests", "migrations"]
disable_error_code = ["misc", "attr-defined", "no-untyped-call"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"